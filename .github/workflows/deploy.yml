# Nombre del flujo de trabajo que aparecerá en la pestaña "Actions" de GitHub
name: Deploy to GitHub Pages

# Define cuándo se debe ejecutar esta acción
on:
  # Se ejecuta cada vez que haces un "push" (subes cambios) a la rama 'main'
  push:
    branches:
      - main
  
  # Permite ejecutar esta acción manualmente desde la pestaña Actions
  workflow_dispatch:

# Configura los permisos que necesitará la acción para poder desplegar
permissions:
  contents: read
  pages: write
  id-token: write

# Define los trabajos que se ejecutarán
jobs:
  # Solo hay un trabajo en este flujo, llamado 'deploy'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest # Se ejecutará en una máquina virtual con Ubuntu
    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configura el entorno de GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Construye el "artefacto" (el paquete con los archivos de tu web)
      # Para un sitio HTML simple, solo necesitamos subir el directorio raíz '.'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el contenido desde el directorio raíz
          path: '.'

      # 4. Despliega el artefacto a GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4