<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Check-in Jornadas UTN</title>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul: #2B4FFE;
    --azul-dark: #1a35d4;
    --ok: #00c07a;
    --error: #ff3b5c;
    --warn: #f5a623;
    --bg: #0d0f1a;
    --surface: #161929;
    --text: #e8eaf6;
    --muted: #6b7280;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
    gap: 1rem;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    padding-top: 0.5rem;
  }

  .logo {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--azul);
    text-transform: uppercase;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .scanner-wrap {
    width: 100%;
    max-width: 480px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 1/1;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 60%;
    aspect-ratio: 1/1;
    position: relative;
  }

  .scan-frame::before,
  .scan-frame::after,
  .scan-frame span::before,
  .scan-frame span::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--azul);
    border-style: solid;
  }

  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
  .scan-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--azul), transparent);
    animation: scan 2s linear infinite;
    top: 0;
  }

  @keyframes scan {
    0%   { top: 0%; opacity: 1; }
    95%  { top: 100%; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .paused-msg {
    position: absolute;
    inset: 0;
    background: rgba(13,15,26,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--muted);
    display: none;
  }

  .paused-msg.visible { display: flex; }

  /* resultado */
  #resultado {
    width: 100%;
    max-width: 480px;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.03em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #resultado.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #resultado.ok      { background: rgba(0,192,122,0.15); border: 1px solid var(--ok);    color: var(--ok); }
  #resultado.error   { background: rgba(255,59,92,0.15);  border: 1px solid var(--error); color: var(--error); }
  #resultado.warning { background: rgba(245,166,35,0.15); border: 1px solid var(--warn);  color: var(--warn); }

  /* detalle */
  #detalle {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    display: none;
    gap: 0.4rem;
    flex-direction: column;
  }

  #detalle.visible { display: flex; }

  #detalle .row {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
  }

  #detalle .label { color: var(--azul); text-transform: uppercase; font-size: 0.7rem; }
  #detalle .val   { color: var(--text); font-weight: 600; }

  /* botón reintentar */
  #btn-continuar {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 0.85rem;
    background: var(--azul);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  #btn-continuar:active { background: var(--azul-dark); }
  #btn-continuar.visible { display: block; }

  /* contador */
  .contador {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  #canvas { display: none; }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ok);
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">UTN FRLP · Jornadas 2025</div>
  <h1><span class="status-dot" id="dot"></span>CHECK-IN</h1>
</header>

<div class="scanner-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="scanner-overlay">
    <div class="scan-frame">
      <span></span>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="paused-msg" id="paused-msg">Procesando...</div>
</div>

<div id="resultado"></div>

<div id="detalle">
  <div class="row">
    <span class="label">Nombre</span>
    <span class="val" id="d-nombre">—</span>
  </div>
  <div class="row">
    <span class="label">Legajo</span>
    <span class="val" id="d-legajo">—</span>
  </div>
  <div class="row">
    <span class="label">Charla</span>
    <span class="val" id="d-charla">—</span>
  </div>
</div>

<button id="btn-continuar" onclick="reanudar()">ESCANEAR SIGUIENTE</button>

<div class="contador">registros: <span id="contador">0</span></div>

<div id="debug" style="width:100%;max-width:480px;background:var(--surface);border-radius:10px;padding:0.85rem 1rem;font-size:0.75rem;color:var(--muted);margin-top:0.5rem;"><div style="color:var(--azul);text-transform:uppercase;font-size:0.7rem;margin-bottom:0.4rem;">debug — último QR leído</div><div id="debug-raw" style="color:var(--text);word-break:break-all;">—</div></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_8e6zthszBrOYtv3Jx1EjP9_ukNSaQ_IPZ6q_9bREjbXGzrlAsLkS3OyfKhKrGaUGHQ/exec';
const TOKEN_VALIDO = 'utn2025'; // cambiá esto antes de publicar

const tokenURL = new URLSearchParams(window.location.search).get('token');
if (tokenURL !== TOKEN_VALIDO) {
  document.body.innerHTML = '';
  document.body.style.background = '#0d0f1a';
}

const video      = document.getElementById('video');
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const resultado  = document.getElementById('resultado');
const detalle    = document.getElementById('detalle');
const btnCont    = document.getElementById('btn-continuar');
const pausedMsg  = document.getElementById('paused-msg');
const dot        = document.getElementById('dot');

let scanning   = false;
let pausado    = false;
let contador   = 0;
let animFrame  = null;
let lastQR     = null;

navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
  .then(stream => {
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadedmetadata', () => {
      scanning = true;
      tick();
    });
  })
  .catch(() => mostrarError('Sin acceso a la cámara'));

function tick() {
  if (!scanning || pausado) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code) {
      document.getElementById("debug-raw").textContent = code.data;
    }
    if (code && code.data !== lastQR) {
      lastQR = code.data;
      procesarQR(code.data);
      return;
    }
  }
  animFrame = requestAnimationFrame(tick);
}

function procesarQR(raw) {
  pausado = true;
  pausedMsg.classList.add('visible');
  dot.style.animationPlayState = 'paused';

  const partes = raw.split(';').map(p => p.trim());
  const charla = partes[0] || '';
  const legajo = partes[1] || '';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ qr: raw })
  })
  .then(() => {
    pausedMsg.classList.remove('visible');
    mostrarOk('Registrado', legajo, charla);
    contador++;
    document.getElementById('contador').textContent = contador;
  })
  .catch(() => {
    pausedMsg.classList.remove('visible');
    mostrarError('Error de red');
  });
}

function mostrarOk(msg, legajo, charla) {
  resultado.className = 'visible ok';
  resultado.textContent = '✓ ' + msg;
  mostrarDetalle(msg.replace('Bienvenido, ', ''), legajo, charla);
  btnCont.classList.add('visible');
}

function mostrarWarning(msg, legajo, charla) {
  resultado.className = 'visible warning';
  resultado.textContent = '⚠ ' + msg;
  mostrarDetalle('', legajo, charla);
  btnCont.classList.add('visible');
}

function mostrarError(msg) {
  resultado.className = 'visible error';
  resultado.textContent = '✗ ' + msg;
  detalle.classList.remove('visible');
  btnCont.classList.add('visible');
}

function mostrarDetalle(nombre, legajo, charla) {
  document.getElementById('d-nombre').textContent = nombre || '—';
  document.getElementById('d-legajo').textContent = legajo || '—';
  document.getElementById('d-charla').textContent = charla || '—';
  detalle.classList.add('visible');
}

function reanudar() {
  resultado.className = '';
  resultado.textContent = '';
  detalle.classList.remove('visible');
  btnCont.classList.remove('visible');
  lastQR  = null;
  pausado = false;
  dot.style.animationPlayState = 'running';
  animFrame = requestAnimationFrame(tick);
}
</script>
</body>
</html>
